name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    name: Check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check
        run: cargo check

      - name: Test
        run: cargo test

  release:
    name: Build Windows Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $cargoVersion = (
            Select-String -Path "Cargo.toml" -Pattern '^version = "(.+)"$'
          ).Matches[0].Groups[1].Value

          if ($tagVersion -ne $cargoVersion) {
            throw "Tag version $tagVersion does not match Cargo.toml version $cargoVersion"
          }

      - name: Build release
        run: cargo build --release --locked

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $archive = "DevDock-$version-windows-x64.zip"
          $checksum = "$archive.sha256"

          New-Item -ItemType Directory -Path "package"
          Copy-Item "target\release\DevDock.exe" "package\DevDock.exe"
          Compress-Archive -Path "package\DevDock.exe" -DestinationPath $archive

          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Set-Content $checksum -NoNewline

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevDock-${{ github.ref_name }}-windows-x64
          path: |
            DevDock-*-windows-x64.zip
            DevDock-*-windows-x64.zip.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            DevDock-*-windows-x64.zip
            DevDock-*-windows-x64.zip.sha256
